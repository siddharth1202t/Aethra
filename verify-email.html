<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Verify Your Email - Aethra</title>
  <meta
    name="description"
    content="Verify your email to continue into Aethra and unlock your premium AI character experience."
  />
  <link rel="icon" type="image/png" href="/images/favicon.png?v=5" />
  <link rel="stylesheet" href="styles/verify-email.css?v=2" />
</head>
<body>
  <canvas class="stars-canvas" id="starsCanvas" data-scene="auth" aria-hidden="true"></canvas>

  <div class="aurora" aria-hidden="true">
    <div class="blob one"></div>
    <div class="blob two"></div>
    <div class="blob three"></div>
  </div>

  <main class="page">
    <section class="card" id="verifyCard" aria-labelledby="verifyTitle">
      <div class="badge">Account security</div>

      <h1 id="verifyTitle">Verify your email</h1>

      <div id="statusIcon" class="status-icon" aria-hidden="true">✔️</div>

      <p class="subtext" id="subtext">
        We sent a verification email to your inbox. Please verify your email address before entering Aethra.
      </p>

      <div id="messageBox" class="msg" aria-live="polite"></div>

      <div class="actions">
        <button id="resendBtn" class="btn btn-primary" type="button">
          Resend Verification Email
        </button>
      </div>
    </section>
  </main>

  <script src="js/stars-canvas.js?v=3" defer></script>
  <script type="module" src="js/verify-email.js"></script>
</body>
</html>
