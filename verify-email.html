<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Your Email - Aethra</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    :root {
      --bg-1: #070014;
      --bg-2: #100423;
      --bg-3: #1a0a38;
      --text: #f5f2ff;
      --muted: rgba(231, 226, 255, 0.72);
      --shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(127, 90, 255, 0.22), transparent 22%),
        radial-gradient(circle at 85% 25%, rgba(93, 228, 255, 0.14), transparent 20%),
        radial-gradient(circle at 50% 85%, rgba(167, 92, 255, 0.14), transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3) 75%, #0b0218);
    }

    .card {
      width: min(520px, 100%);
      padding: 34px 28px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .msg {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .msg.show {
      display: block;
    }

    .msg.error {
      background: rgba(255, 102, 102, 0.12);
      border: 1px solid rgba(255, 102, 102, 0.2);
      color: #ffd0d0;
    }

    .msg.success {
      background: rgba(125, 255, 179, 0.12);
      border: 1px solid rgba(125, 255, 179, 0.2);
      color: #d4ffe6;
    }

    .btn {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      background: linear-gradient(135deg, #7b61ff, #9a7cff);
      box-shadow: 0 10px 35px rgba(123, 97, 255, 0.35);
      transition: 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: none;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verify your email</h1>
    <p>
      We sent a verification email to your inbox. Please verify your email address before entering Aethra.
    </p>

    <div id="messageBox" class="msg" aria-live="polite"></div>

    <button id="resendBtn" class="btn">Resend Verification Email</button>
    <button id="refreshBtn" class="btn secondary">I Have Verified My Email</button>
    <button id="logoutBtn" class="btn secondary">Logout</button>
  </div>

  <script type="module" src="js/app-check.js"></script>

  <script type="module">
    import {
      getAuth,
      onAuthStateChanged,
      reload,
      sendEmailVerification,
      signOut
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { app } from "./js/firestore-config.js";

    const RESEND_COOLDOWN_SECONDS = 60;

    const auth = getAuth(app);

    const resendBtn = document.getElementById("resendBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const messageBox = document.getElementById("messageBox");

    let resendCountdown = null;
    let resendRemaining = 0;

    function goTo(page) {
      window.location.replace(page);
    }

    function showMessage(text, type = "error") {
      messageBox.textContent = text;
      messageBox.className = `msg show ${type}`;
    }

    function clearMessage() {
      messageBox.textContent = "";
      messageBox.className = "msg";
    }

    function setLoading(button, text) {
      if (!button) return;
      button.dataset.originalText = button.dataset.originalText || button.textContent;
      button.disabled = true;
      button.textContent = text;
    }

    function clearLoading(button) {
      if (!button) return;
      button.disabled = false;
      button.textContent = button.dataset.originalText || button.textContent;
    }

    function clearResendCountdown() {
      if (resendCountdown) {
        clearInterval(resendCountdown);
        resendCountdown = null;
      }
    }

    function setResendCooldown(seconds = RESEND_COOLDOWN_SECONDS) {
      resendRemaining = seconds;
      resendBtn.disabled = true;
      resendBtn.textContent = `Resend available in ${resendRemaining}s`;

      clearResendCountdown();

      resendCountdown = setInterval(() => {
        resendRemaining -= 1;

        if (resendRemaining <= 0) {
          clearResendCountdown();
          resendBtn.disabled = false;
          resendBtn.textContent = "Resend Verification Email";
          return;
        }

        resendBtn.textContent = `Resend available in ${resendRemaining}s`;
      }, 1000);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        goTo("login.html");
        return;
      }

      try {
        await reload(user);

        if (auth.currentUser?.emailVerified) {
          goTo("home.html");
        }
      } catch (error) {
        console.error("Verification page auth refresh failed:", error);
      }
    });

    resendBtn.addEventListener("click", async () => {
      const user = auth.currentUser;

      if (!user) {
        goTo("login.html");
        return;
      }

      if (resendRemaining > 0) {
        return;
      }

      try {
        clearMessage();
        setLoading(resendBtn, "Sending...");
        await sendEmailVerification(user);
        showMessage("Verification email sent again. Please check your inbox.", "success");
        clearLoading(resendBtn);
        setResendCooldown();
      } catch (error) {
        console.error("Resend verification failed:", error);
        clearLoading(resendBtn);
        showMessage("Could not resend verification email right now. Please try again.");
      }
    });

    refreshBtn.addEventListener("click", async () => {
      const user = auth.currentUser;

      if (!user) {
        goTo("login.html");
        return;
      }

      try {
        clearMessage();
        setLoading(refreshBtn, "Checking...");
        await reload(user);

        if (auth.currentUser?.emailVerified) {
          goTo("home.html");
          return;
        }

        showMessage("Your email is still not verified yet. Please verify it first, then try again.");
      } catch (error) {
        console.error("Verification refresh failed:", error);
        showMessage("Could not refresh your verification status. Please try again.");
      } finally {
        clearLoading(refreshBtn);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("Logout failed:", error);
      } finally {
        goTo("login.html");
      }
    });

    window.addEventListener("beforeunload", () => {
      clearResendCountdown();
    });
  </script>
</body>
</html>
