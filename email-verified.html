<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aethra • Email Verified</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      background: radial-gradient(circle at top, #1e293b, #020617);
      color: #e2e8f0;
    }

    .card {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);

      padding: 48px 40px;
      border-radius: 20px;

      box-shadow:
        0 20px 50px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);

      text-align: center;
      max-width: 420px;
      width: 90%;

      border: 1px solid rgba(255,255,255,0.08);

      animation: fadeIn 0.6s ease;
    }

    .brand {
      font-size: 14px;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;

      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);

      animation: pop 0.5s ease;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      stroke: #22c55e;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #f1f5f9;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    button {
      width: 100%;
      padding: 14px;

      border-radius: 10px;
      border: none;

      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;

      font-weight: 600;
      letter-spacing: 0.3px;

      cursor: pointer;

      transition: all 0.25s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
    }

    button:active {
      transform: scale(0.98);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #64748b;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pop {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="brand">AETHRA</div>

    <div class="icon">
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M8 12l3 3 5-5"></path>
      </svg>
    </div>

    <h1>Email Verified</h1>

    <p>
      Your account is now fully activated.  
      You can securely access Aethra and begin your experience.
    </p>

    <button onclick="goToLogin()">Continue to Login</button>

    <div class="footer">
      Secure verification • Aethra System
    </div>

  </div>

  <script>
    function goToLogin() {
      window.location.href = "/login.html";
    }

    // Optional safety check
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");

    if (mode && mode !== "verifyEmail") {
      document.body.innerHTML = `
        <div style="color:white;text-align:center;">
          <h2>Invalid or expired link</h2>
        </div>
      `;
    }
  </script>

</body>
</html>
