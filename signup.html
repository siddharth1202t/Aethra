<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aethra Signup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    :root {
      --bg-1: #070014;
      --bg-2: #100423;
      --bg-3: #1a0a38;
      --text: #f5f2ff;
      --muted: rgba(231, 226, 255, 0.72);
      --accent: #8a6cff;
      --accent-2: #5de4ff;
      --shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(127, 90, 255, 0.22), transparent 22%),
        radial-gradient(circle at 85% 25%, rgba(93, 228, 255, 0.14), transparent 20%),
        radial-gradient(circle at 50% 85%, rgba(167, 92, 255, 0.14), transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3) 75%, #0b0218);
      position: relative;
    }

    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      50% {
        opacity: 1;
        transform: scale(1.6);
      }
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      gap: 28px;
      align-items: center;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .side-character {
      height: 72vh;
      min-height: 460px;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .side-character img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: saturate(1.08) brightness(0.88);
    }

    .side-character::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(4, 0, 18, 0.95), rgba(13, 5, 36, 0.18));
    }

    .side-label {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 2;
    }

    .side-label h3 {
      font-size: 1.7rem;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .side-label p {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
      max-width: 180px;
    }

    .center-wrap {
      display: flex;
      justify-content: center;
    }

    .signup-card {
      width: min(500px, 100%);
      padding: 38px 32px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .signup-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(138,108,255,0.14), transparent 40%);
      pointer-events: none;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 0.95rem;
      text-decoration: none;
    }

    .back-link:hover {
      color: white;
    }

    .badge {
      display: inline-flex;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(138,108,255,0.12);
      border: 1px solid rgba(255,255,255,0.08);
      color: #ddd4ff;
      font-size: 0.88rem;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 10px;
    }

    .subtext {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .field {
      text-align: left;
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 0.92rem;
      color: rgba(240,238,255,0.88);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
      font-size: 0.98rem;
    }

    .field input::placeholder {
      color: rgba(220, 216, 245, 0.45);
    }

    .field input:focus {
      border-color: rgba(138,108,255,0.45);
      box-shadow: 0 0 0 3px rgba(138,108,255,0.12);
    }

    .signup-btn {
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #7b61ff, #9a7cff);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 10px 35px rgba(123, 97, 255, 0.38);
      transition: 0.25s ease;
    }

    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(123, 97, 255, 0.55);
    }

    .bottom-text {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .bottom-text a {
      color: #b79cff;
      text-decoration: none;
      font-weight: 600;
    }

    .bottom-text a:hover {
      color: white;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }

      .side-character {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 16px;
      }

      .signup-card {
        padding: 30px 20px;
        border-radius: 22px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="page">
    <div class="side-character">
      <img src="images/character-left.png" alt="Akira">
      <div class="side-label">
        <h3>AKIRA</h3>
        <p>Step into a world where every choice shapes your connection.</p>
      </div>
    </div>

    <div class="center-wrap">
      <div class="signup-card">
        <a href="index.html" class="back-link">← Back to Aethra</a>
        <div class="badge">Create your account</div>
        <h1>Join Aethra</h1>
        <p class="subtext">
          Create your profile and begin exploring a world of living AI characters.
        </p>

        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Choose a username">
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create a password">
        </div>

        <button class="signup-btn" onclick="signup()">Create Account</button>

        <div class="bottom-text">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </div>
    </div>

    <div class="side-character">
      <img src="images/character-right.png" alt="Luna">
      <div class="side-label">
        <h3>LUNA</h3>
        <p>Warm, elegant, and ready to welcome you into Aethra.</p>
      </div>
    </div>
  </div>

  <script>
    const starsContainer = document.getElementById("stars");

    for (let i = 0; i < 90; i++) {
      const star = document.createElement("div");
      star.classList.add("star");
      const size = Math.random() * 2.2 + 1;
      star.style.width = size + "px";
      star.style.height = size + "px";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 100 + "vh";
      star.style.animationDuration = (Math.random() * 4 + 2) + "s";
      star.style.animationDelay = Math.random() * 4 + "s";
      starsContainer.appendChild(star);
    }
    <script>

  const star = document.createElement("div");
  star.classList.add("star");

</script>

<script type="module" src="js/signup.js"></script>

</body>
</html>
<script type="module" src="js/signup.js"></script>
  </script>
</body>
</html>
