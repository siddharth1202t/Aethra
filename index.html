<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aethra</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
      height: 100vh;
      position: relative;
      background: #050816;
    }

    /* Animated gradient background */
    .background {
      position: fixed;
      inset: 0;
      background: linear-gradient(-45deg, #050816, #0b1026, #1a1240, #2d1f64);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
      z-index: -3;
    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* Glowing circles */
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      z-index: -2;
      animation: floatGlow 10s ease-in-out infinite;
    }

    .glow1 {
      width: 300px;
      height: 300px;
      background: #6c63ff;
      top: 10%;
      left: 10%;
    }

    .glow2 {
      width: 250px;
      height: 250px;
      background: #9b5cff;
      bottom: 10%;
      right: 12%;
      animation-delay: 2s;
    }

    .glow3 {
      width: 220px;
      height: 220px;
      background: #3b82f6;
      top: 55%;
      left: 45%;
      animation-delay: 4s;
    }

    @keyframes floatGlow {
      0%, 100% {
        transform: translateY(0px) translateX(0px) scale(1);
      }
      50% {
        transform: translateY(-20px) translateX(15px) scale(1.08);
      }
    }

    /* Tiny stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.2;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero {
      max-width: 850px;
      padding: 40px 30px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      animation: fadeUp 1.2s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 64px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 40px;
      margin-bottom: 18px;
      line-height: 1.2;
    }

    p {
      font-size: 22px;
      color: #d8d8e8;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    button {
      padding: 16px 34px;
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(90deg, #6c63ff, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.35);
    }

    button:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 0 28px rgba(139, 92, 246, 0.55);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 42px;
      }

      h2 {
        font-size: 28px;
      }

      p {
        font-size: 18px;
      }

      .hero {
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>
  <div class="glow glow3"></div>

  <div class="stars">
    <div class="star" style="top:10%; left:15%; animation-delay:0s;"></div>
    <div class="star" style="top:20%; left:70%; animation-delay:1s;"></div>
    <div class="star" style="top:35%; left:25%; animation-delay:2s;"></div>
    <div class="star" style="top:50%; left:80%; animation-delay:0.5s;"></div>
    <div class="star" style="top:65%; left:40%; animation-delay:1.5s;"></div>
    <div class="star" style="top:75%; left:60%; animation-delay:2.5s;"></div>
    <div class="star" style="top:15%; left:50%; animation-delay:0.8s;"></div>
    <div class="star" style="top:85%; left:20%; animation-delay:1.8s;"></div>
    <div class="star" style="top:55%; left:10%; animation-delay:2.2s;"></div>
    <div class="star" style="top:30%; left:90%; animation-delay:0.3s;"></div>
  </div>

  <div class="container">
    <div class="hero">
      <h1>AETHRA</h1>
      <h2>Experience AI That Feels Real</h2>
      <p>
        Talk with AI characters that live their own lives, have schedules,
        emotions, and evolving relationships.
      </p>
      <button onclick="alert('Characters page coming next, bro 🚀')">Enter Aethra</button>
    </div>
  </div>
</body>
</html>
